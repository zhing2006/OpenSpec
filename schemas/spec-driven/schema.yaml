name: spec-driven
version: 1
description: 默认 OGD 工作流 - 提案 → 规范 → 设计 → 任务

artifacts:
  - id: proposal
    generates: proposal.md
    description: 设计变更提案 - 说明为什么需要这个变更
    template: proposal.md
    instruction: |
      创建设计变更提案文档，说明为什么需要这个变更。

      章节：
      - **为什么 (Why)**：1-2 句话描述问题或机会。解决什么问题？为什么现在做？
      - **变更内容 (What Changes)**：变更列表。具体说明新增能力、修改或移除。破坏性变更用 **BREAKING** 标注。
      - **能力 (Capabilities)**：识别要创建或修改的规范：
        - **新增能力**：列出要引入的能力。每个对应 `specs/<name>/spec.md`。使用 kebab-case 命名。
        - **修改能力**：列出需求发生变化的现有能力。只在规范级行为改变时包含（不仅仅是实现细节）。
          每个需要增量规范文件。检查 `ogd/specs/` 查看现有规范名称。如无需求变更则留空。
      - **影响 (Impact)**：受影响的代码、API、依赖或系统。

      重要：能力章节至关重要。它建立了提案和规范阶段之间的契约。
      填写前先研究现有规范。这里列出的每个能力都需要对应的规范文件。

      保持简洁（1-2 页）。聚焦"为什么"而非"怎么做"——实现细节属于 design.md。

      这是基础——规范、设计和任务都建立在此之上。
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: 详细规范 - 定义系统应该做什么
    template: spec.md
    instruction: |
      创建规范文件，定义系统应该做什么。

      每个能力/功能区域创建一个规范文件：specs/<name>/spec.md

      增量操作（使用 ## 标题）：
      - **ADDED Requirements**：新增能力
      - **MODIFIED Requirements**：行为变更 - 必须包含完整的更新内容
      - **REMOVED Requirements**：废弃功能 - 必须包含 **原因** 和 **迁移方案**
      - **RENAMED Requirements**：仅名称变更 - 使用 FROM:/TO: 格式

      需求格式：
      - 每个需求：`### Requirement: <name>` 后跟描述
      - 规范性需求使用 SHALL/MUST（避免 should/may）
      - 每个场景：`#### Scenario: <name>` 使用 WHEN/THEN 格式
      - **关键**：场景必须正好使用 4 个 # 号 (`####`)。使用 3 个 # 或列表会静默失败。
      - 每个需求必须至少有一个场景。

      MODIFIED 需求工作流：
      1. 在 ogd/specs/<capability>/spec.md 中找到现有需求
      2. 复制整个需求块（从 `### Requirement:` 到所有场景）
      3. 粘贴到 `## MODIFIED Requirements` 下并编辑以反映新行为
      4. 确保标题文本完全匹配（忽略空白）

      常见陷阱：使用部分内容的 MODIFIED 会在归档时丢失细节。
      如果添加新关注点但不改变现有行为，改用 ADDED。

      游戏设计特定章节（可选）：
      - **类型**：全局型 / 功能型
      - **规范依赖**：功能规范必须依赖 game-vision
      - **愿景**：游戏愿景或功能愿景
      - **世界观**：世界设定或功能定位

      规范应该可测试——每个场景就是一个潜在的测试用例。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: 设计决策文档 - 说明如何实现变更
    template: design.md
    instruction: |
      创建设计决策文档，说明如何实现变更。

      何时包含 design.md（满足任一条件时创建）：
      - 跨系统变更（多个服务/模块）或新的架构模式
      - 新的外部依赖或重大数据模型变更
      - 安全、性能或迁移复杂性
      - 需要在编码前做技术决策的歧义

      章节：
      - **背景 (Context)**：背景、当前状态、约束、利益相关者
      - **目标 / 非目标 (Goals / Non-Goals)**：这个设计实现什么，明确排除什么
      - **决策 (Decisions)**：关键技术选择及理由（为什么选 X 而非 Y？）。
        包含每个决策考虑的备选方案。
      - **风险 / 权衡 (Risks / Trade-offs)**：已知限制，可能出错的事情。
        格式：[风险] → 缓解措施
      - **迁移计划 (Migration Plan)**：部署步骤、回滚策略（如适用）
      - **开放问题 (Open Questions)**：待解决的决策或未知事项

      游戏设计特定章节（可选）：
      - **数值框架**：核心公式、平衡参数
      - **情感曲线**：体验节奏设计
      - **系统集成**：与其他系统的交互

      聚焦架构和方法，而非逐行实现。
      引用提案获取动机，引用规范获取需求。

      好的设计文档解释技术决策背后的"为什么"。
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: 设计任务分解 - 从规范和设计派生的任务
    template: tasks.md
    instruction: |
      创建任务列表，分解设计工作。

      指南：
      - 使用 ## 编号标题分组相关任务
      - 每个任务是一个复选框：- [ ] X.Y 任务描述
      - 任务应该小到可以在一次会话中完成
      - 按依赖顺序排列任务（什么必须先做？）

      示例：
      ```
      ## 1. 准备工作

      - [ ] 1.1 验证设计支柱对齐
      - [ ] 1.2 创建设计文档目录

      ## 2. 核心设计

      - [ ] 2.1 编写玩法设计文档
      - [ ] 2.2 构建数值框架
      ```

      引用规范了解要设计什么，引用设计文档了解如何设计。
      每个任务应该可验证——你知道什么时候完成。
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    阅读上下文文件，按任务列表完成设计工作。
    完成后标记每个任务为已完成。
    遇到阻碍或需要澄清时暂停。

    设计产物类型：
    - gameplay-design.md：玩法设计
    - numerical-framework.md：数值框架
    - balance-analysis.md：平衡分析
    - system-integration.md：系统集成
    - narrative-design.md：叙事设计
    - world-setting.md：世界设定
    - core-loop.md：核心循环
    - emotional-curve.md：情感曲线
